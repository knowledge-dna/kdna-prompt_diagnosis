name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install kdna-cli
        run: npm install -g @aikdna/kdna-cli
      - name: Validate dev source
        run: kdna dev validate .
